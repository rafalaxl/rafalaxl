<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradiente do traço principal (Electric Blue para Deep Navy) -->
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3e7dff" />
      <stop offset="100%" stop-color="#12233c" />
    </linearGradient>
    <!-- Gradiente secundário -->
    <linearGradient id="grad-accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b5ad9" />
      <stop offset="100%" stop-color="#3e7dff" />
    </linearGradient>
  </defs>
  <!-- Linhas de conexão (Nexus) -->
  <path d="M 30 75 L 30 25 L 70 75 L 70 25" fill="none" stroke="url(#grad-main)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Linhas secundárias para efeito de profundidade/duplicidade -->
  <path d="M 30 75 Q 50 75 70 25" fill="none" stroke="url(#grad-accent)" stroke-width="3" stroke-dasharray="4 6" stroke-linecap="round" />
  
  <!-- Nós da Conexão (Círculos) -->
  <circle cx="30" cy="25" r="7" fill="#3e7dff" stroke="#ffffff" stroke-width="2" />
  <circle cx="70" cy="75" r="7" fill="#12233c" stroke="#3e7dff" stroke-width="2" />
  <circle cx="30" cy="75" r="5" fill="#2b5ad9" />
  <circle cx="70" cy="25" r="5" fill="#3e7dff" />
  <circle cx="50" cy="50" r="4" fill="#ffffff" />
</svg>
